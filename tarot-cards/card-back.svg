<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <rect x="10" y="10" width="280" height="430" rx="20" ry="20" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2"/>
  
  <!-- Moon symbol -->
  <circle cx="150" cy="180" r="40" fill="#c9a84c" opacity="0.1"/>
  <circle cx="130" cy="160" r="30" fill="#c9a84c" opacity="0.2"/>
  
  <!-- Stars -->
  <circle cx="80" cy="80" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="100" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="120" cy="300" r="2.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="250" cy="250" r="1.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="180" cy="380" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="50" cy="350" r="1.5" fill="#ffffff" opacity="0.5"/>
  
  <!-- Mystic pattern -->
  <path d="M150,220 Q180,200 210,220 Q180,240 150,220" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <path d="M150,280 Q120,260 90,280 Q120,300 150,280" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  
  <!-- Text -->
  <text x="150" y="400" text-anchor="middle" font-family="Cormorant Garamond" font-size="18" fill="#c9a84c" opacity="0.8">
    TAROT WHISPER
  </text>
</svg>